<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0b1020" />
  <meta name="description" content="Browser-based incremental mining & automation game." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mining Empire" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <title>Mining Empire</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="view-game">
  <header id="save-bar">
    <strong class="brand">⛏ Mining Empire</strong>
    <button id="btn-fame" type="button" title="Hall of Fame">Hall of Fame</button>
    <button id="btn-cloud-sync" type="button" title="Save your progress to the cloud">☁ Save to cloud</button>
    <button id="btn-export" title="Download your save as a .json file (contains your cloud ID)">Export</button>
    <button id="btn-import" title="Load a .json save file">Import</button>
    <button id="btn-reset" title="Wipe localStorage and start fresh (new cloud ID)">Reset</button>
    <button id="btn-developer" type="button" title="About the developer">Developer</button>
    <input id="file-input" type="file" accept="application/json" hidden />
    <span id="cloud-status" class="cloud-status cloud-muted">Local only</span>
    <span id="save-status" aria-live="polite"></span>
  </header>
  <aside id="side-panel">
    <h2>Upgrades</h2>
    <div id="upgrade-list"></div>
  </aside>
  <div id="game"></div>
  <footer id="hint">No login — your save file is your account. Lose the file = lose access.</footer>

  <section id="fame-view"></section>

  <div id="offline-banner" hidden role="dialog" aria-modal="true">
    <div class="offline-card">
      <h3>Welcome back, miner</h3>
      <p id="offline-summary"></p>
      <button id="offline-dismiss" type="button">Collect</button>
    </div>
  </div>

  <div id="developer-modal" hidden role="dialog" aria-modal="true" aria-labelledby="developer-name">
    <div class="developer-card">
      <button class="modal-close" id="developer-close" type="button" aria-label="Close">×</button>
      <img id="developer-avatar" class="developer-avatar" alt="" />
      <h3 id="developer-name">Anmol</h3>
      <p class="developer-role" id="developer-role">Developer</p>
      <div class="developer-links">
        <a id="developer-github" href="#" target="_blank" rel="noopener noreferrer">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
          GitHub
        </a>
        <a id="developer-linkedin" href="#" target="_blank" rel="noopener noreferrer">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M0 1.146C0 .513.526 0 1.175 0h13.65C15.474 0 16 .513 16 1.146v13.708c0 .633-.526 1.146-1.175 1.146H1.175C.526 16 0 15.487 0 14.854V1.146zm4.943 12.248V6.169H2.542v7.225h2.401zm-1.2-8.212c.837 0 1.358-.554 1.358-1.248-.015-.709-.52-1.248-1.342-1.248-.822 0-1.359.54-1.359 1.248 0 .694.521 1.248 1.327 1.248h.016zm4.908 8.212V9.359c0-.216.016-.432.08-.586.173-.431.568-.878 1.232-.878.869 0 1.216.662 1.216 1.634v3.865h2.401V9.25c0-2.22-1.184-3.252-2.764-3.252-1.274 0-1.845.7-2.165 1.193v.025h-.016a5.54 5.54 0 01.016-.025V6.169h-2.4c.03.678 0 7.225 0 7.225h2.4z"/>
          </svg>
          LinkedIn
        </a>
      </div>
    </div>
  </div>

  <div id="loading-screen">
    <div class="loading-content">
      <h1>⛏ Mining Empire</h1>
      <p id="loading-status">Booting…</p>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
